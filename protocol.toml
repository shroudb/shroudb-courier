[protocol]
name = "courier"
version = "1.0.0"
description = "Just-in-time decryption delivery engine"
default_tcp_port = 6999
uri_scheme = "shroudb-courier"
uri_scheme_tls = "shroudb-courier+tls"

[wire]
format = "resp3"
request = "array_of_bulk_strings"
success = "bulk_string_json"
error = "simple_error"

# --- Error codes ---

[errors.NOTFOUND]
description = "Channel not found"
http_status = 404

[errors.EXISTS]
description = "Channel already exists"
http_status = 409

[errors.BADARG]
description = "Invalid argument or malformed JSON"
http_status = 400

[errors.DENIED]
description = "Access denied"
http_status = 403

[errors.AUTH_REQUIRED]
description = "Authentication required"
http_status = 401

[errors.ADAPTER]
description = "Delivery adapter failure"
http_status = 502

[errors.DECRYPT]
description = "Cipher decryption failed"
http_status = 500

[errors.INTERNAL]
description = "Unexpected internal error"
http_status = 500

# --- Commands ---

[commands.AUTH]
syntax = "AUTH <token>"
description = "Authenticate the connection with a token"
acl = "none"
parameters = [
    { name = "token", type = "string", required = true, description = "Authentication token" },
]
response = { status = "string" }

[commands.CHANNEL_CREATE]
syntax = "CHANNEL CREATE <name> <type> <config_json>"
description = "Create a delivery channel"
acl = "admin"
parameters = [
    { name = "name", type = "channel_name", required = true, description = "Channel name" },
    { name = "type", type = "channel_type", required = true, description = "Channel type (email, webhook)" },
    { name = "config_json", type = "json_value", required = true, description = "Adapter configuration" },
]
response = { status = "string", name = "string", channel_type = "string" }

[commands.CHANNEL_GET]
syntax = "CHANNEL GET <name>"
description = "Get channel configuration"
acl = "namespace_read"
parameters = [
    { name = "name", type = "channel_name", required = true, description = "Channel name" },
]
response = { name = "string", channel_type = "string", enabled = "boolean", created_at = "integer" }

[commands.CHANNEL_LIST]
syntax = "CHANNEL LIST"
description = "List all channels"
acl = "none"
response = { status = "string", count = "integer", channels = "array" }

[commands.CHANNEL_DELETE]
syntax = "CHANNEL DELETE <name>"
description = "Delete a channel"
acl = "admin"
parameters = [
    { name = "name", type = "channel_name", required = true, description = "Channel name" },
]
response = { status = "string", name = "string" }

[commands.NOTIFY_EVENT]
syntax = "NOTIFY_EVENT <channel> <subject> <body>"
description = "Trigger a notification on a pre-configured channel (e.g. rotation/expiry alerts)"
acl = "namespace_write"
parameters = [
    { name = "channel", type = "channel_name", required = true, description = "Channel name (must have default_recipient)" },
    { name = "subject", type = "string", required = true, description = "Notification subject" },
    { name = "body", type = "string", required = true, description = "Notification body" },
]
response = { delivery_id = "string", channel = "string", status = "string", delivered_at = "integer" }

[commands.DELIVER]
syntax = "DELIVER <json>"
description = "Decrypt recipient and deliver a message"
acl = "namespace_write"
parameters = [
    { name = "json", type = "json_value", required = true, description = "Delivery request" },
]
response = { delivery_id = "string", channel = "string", status = "string", delivered_at = "integer" }

[commands.DELIVERY_GET]
syntax = "DELIVERY GET <id>"
description = "Get a delivery receipt by ID"
acl = "admin"
parameters = [
    { name = "id", type = "string", required = true, description = "Delivery ID (UUID)" },
]
response = { delivery_id = "string", channel = "string", status = "string", delivered_at = "integer", error = "string" }
errors = ["NOTFOUND"]

[commands.DELIVERY_LIST]
syntax = "DELIVERY LIST [CHANNEL <name>] [LIMIT <n>]"
description = "List delivery receipts, optionally filtered by channel"
acl = "admin"
parameters = [
    { name = "CHANNEL", type = "channel_name", required = false, description = "Filter by channel name" },
    { name = "LIMIT", type = "integer", required = false, description = "Max receipts to return (default 100)" },
]
response = { status = "string", count = "integer", receipts = "array" }

[commands.METRICS]
syntax = "METRICS"
description = "Get delivery metrics (total, success, failure counts, per-channel breakdown)"
acl = "none"
response = { total_deliveries = "integer", delivered = "integer", failed = "integer", per_channel = "object" }

[commands.HEALTH]
syntax = "HEALTH"
description = "Server health check"
acl = "none"
response = { status = "string", channels = "integer" }

[commands.PING]
syntax = "PING"
description = "Connectivity check"
acl = "none"
response = "PONG"

[commands.COMMAND_LIST]
syntax = "COMMAND LIST"
description = "List available commands"
acl = "none"
response = { commands = "array", count = "integer" }

# --- Types ---

[types.channel_name]
base = "string"
pattern = "^[a-zA-Z0-9_-]{1,255}$"
description = "Channel name: alphanumeric, hyphens, underscores"

[types.channel_type]
base = "string"
enum = ["email", "webhook"]
description = "Delivery channel type"

[types.json_value]
base = "string"
description = "JSON-encoded object"
